<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>불사(BULSA) — 건설 안전 시뮬레이터</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body class="onboarding">

  <!-- ① 언어 선택 화면 -->
  <div id="screen-lang" class="screen active">
    <div class="ob-title">불사</div>
    <div class="ob-subtitle">건설 안전 시뮬레이터</div>
    <div class="lang-grid">
      <button class="lang-btn" data-lang="ko">
        <span class="flag">🇰🇷</span>
        <span><span class="lang-name">한국어</span><span class="lang-native">Korean</span></span>
      </button>
      <button class="lang-btn" data-lang="en">
        <span class="flag">🇺🇸</span>
        <span><span class="lang-name">English</span><span class="lang-native">영어</span></span>
      </button>
      <button class="lang-btn" data-lang="vi">
        <span class="flag">🇻🇳</span>
        <span><span class="lang-name">Tiếng Việt</span><span class="lang-native">베트남어</span></span>
      </button>
      <button class="lang-btn" data-lang="ar">
        <span class="flag">🇸🇦</span>
        <span><span class="lang-name">العربية</span><span class="lang-native">아랍어</span></span>
      </button>
    </div>
  </div>

  <!-- ② 캐릭터 생성 화면 -->
  <div id="screen-char" class="screen">
    <div class="ob-card">
      <button class="back-btn" id="btn-back">← 언어 선택</button>
      <h2 id="char-title">캐릭터 생성</h2>

      <!-- 외형 선택 -->
      <div>
        <span class="name-label" id="look-label">외형 선택</span>
        <div class="look-grid" id="look-grid">

          <!-- 0: 주황 안전모 -->
          <button class="look-opt selected" data-look="0" aria-label="외형 A">
            <svg viewBox="0 0 60 88" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="30" cy="16" rx="23" ry="7" fill="#F97316"/>
              <rect x="10" y="19" width="40" height="4" rx="2" fill="#ea6800"/>
              <ellipse cx="30" cy="36" rx="17" ry="19" fill="#FBBF80"/>
              <circle cx="23" cy="33" r="3.2" fill="#1a1a1a"/><circle cx="25" cy="31.5" r="1" fill="#fff"/>
              <circle cx="37" cy="33" r="3.2" fill="#1a1a1a"/><circle cx="39" cy="31.5" r="1" fill="#fff"/>
              <path d="M24 43 Q30 47 36 43" stroke="#c97b50" stroke-width="1.5" stroke-linecap="round" fill="none"/>
              <rect x="17" y="54" width="26" height="22" rx="5" fill="#F97316"/>
              <rect x="22" y="54" width="16" height="4" rx="2" fill="#fff" opacity=".3"/>
              <rect x="7"  y="55" width="9"  height="18" rx="4" fill="#FBBF80"/>
              <rect x="44" y="55" width="9"  height="18" rx="4" fill="#FBBF80"/>
              <rect x="18" y="75" width="10" height="13" rx="3" fill="#374151"/>
              <rect x="32" y="75" width="10" height="13" rx="3" fill="#374151"/>
              <rect x="17" y="85" width="12" height="5"  rx="2" fill="#1e2936"/>
              <rect x="31" y="85" width="12" height="5"  rx="2" fill="#1e2936"/>
            </svg>
          </button>

          <!-- 1: 노란 안전모 -->
          <button class="look-opt" data-look="1" aria-label="외형 B">
            <svg viewBox="0 0 60 88" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="30" cy="16" rx="23" ry="7" fill="#FCD34D"/>
              <rect x="10" y="19" width="40" height="4" rx="2" fill="#e0b800"/>
              <ellipse cx="30" cy="36" rx="17" ry="19" fill="#f5c07a"/>
              <circle cx="23" cy="33" r="3.2" fill="#1a1a1a"/><circle cx="25" cy="31.5" r="1" fill="#fff"/>
              <circle cx="37" cy="33" r="3.2" fill="#1a1a1a"/><circle cx="39" cy="31.5" r="1" fill="#fff"/>
              <path d="M24 43 Q30 47 36 43" stroke="#b8793a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
              <rect x="17" y="54" width="26" height="22" rx="5" fill="#3B82F6"/>
              <rect x="22" y="54" width="16" height="4" rx="2" fill="#fff" opacity=".3"/>
              <rect x="7"  y="55" width="9"  height="18" rx="4" fill="#f5c07a"/>
              <rect x="44" y="55" width="9"  height="18" rx="4" fill="#f5c07a"/>
              <rect x="18" y="75" width="10" height="13" rx="3" fill="#1e3a5f"/>
              <rect x="32" y="75" width="10" height="13" rx="3" fill="#1e3a5f"/>
              <rect x="17" y="85" width="12" height="5"  rx="2" fill="#111c2e"/>
              <rect x="31" y="85" width="12" height="5"  rx="2" fill="#111c2e"/>
            </svg>
          </button>

          <!-- 2: 흰 안전모 -->
          <button class="look-opt" data-look="2" aria-label="외형 C">
            <svg viewBox="0 0 60 88" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="30" cy="16" rx="23" ry="7" fill="#e8e8e8"/>
              <rect x="10" y="19" width="40" height="4" rx="2" fill="#c0c0c0"/>
              <ellipse cx="30" cy="36" rx="17" ry="19" fill="#c8976a"/>
              <circle cx="23" cy="33" r="3.2" fill="#1a1a1a"/><circle cx="25" cy="31.5" r="1" fill="#fff"/>
              <circle cx="37" cy="33" r="3.2" fill="#1a1a1a"/><circle cx="39" cy="31.5" r="1" fill="#fff"/>
              <path d="M24 43 Q30 47 36 43" stroke="#8a5e35" stroke-width="1.5" stroke-linecap="round" fill="none"/>
              <rect x="17" y="54" width="26" height="22" rx="5" fill="#22C55E"/>
              <rect x="22" y="54" width="16" height="4" rx="2" fill="#fff" opacity=".3"/>
              <rect x="7"  y="55" width="9"  height="18" rx="4" fill="#c8976a"/>
              <rect x="44" y="55" width="9"  height="18" rx="4" fill="#c8976a"/>
              <rect x="18" y="75" width="10" height="13" rx="3" fill="#14532d"/>
              <rect x="32" y="75" width="10" height="13" rx="3" fill="#14532d"/>
              <rect x="17" y="85" width="12" height="5"  rx="2" fill="#0a2e14"/>
              <rect x="31" y="85" width="12" height="5"  rx="2" fill="#0a2e14"/>
            </svg>
          </button>

          <!-- 3: 빨간 안전모 -->
          <button class="look-opt" data-look="3" aria-label="외형 D">
            <svg viewBox="0 0 60 88" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="30" cy="16" rx="23" ry="7" fill="#EF4444"/>
              <rect x="10" y="19" width="40" height="4" rx="2" fill="#c02020"/>
              <ellipse cx="30" cy="36" rx="17" ry="19" fill="#a87850"/>
              <circle cx="23" cy="33" r="3.2" fill="#1a1a1a"/><circle cx="25" cy="31.5" r="1" fill="#fff"/>
              <circle cx="37" cy="33" r="3.2" fill="#1a1a1a"/><circle cx="39" cy="31.5" r="1" fill="#fff"/>
              <path d="M24 43 Q30 47 36 43" stroke="#6e4420" stroke-width="1.5" stroke-linecap="round" fill="none"/>
              <rect x="17" y="54" width="26" height="22" rx="5" fill="#6B21A8"/>
              <rect x="22" y="54" width="16" height="4" rx="2" fill="#fff" opacity=".3"/>
              <rect x="7"  y="55" width="9"  height="18" rx="4" fill="#a87850"/>
              <rect x="44" y="55" width="9"  height="18" rx="4" fill="#a87850"/>
              <rect x="18" y="75" width="10" height="13" rx="3" fill="#3b0764"/>
              <rect x="32" y="75" width="10" height="13" rx="3" fill="#3b0764"/>
              <rect x="17" y="85" width="12" height="5"  rx="2" fill="#1e0033"/>
              <rect x="31" y="85" width="12" height="5"  rx="2" fill="#1e0033"/>
            </svg>
          </button>

        </div>
      </div>

      <!-- 이름 입력 -->
      <div>
        <label class="name-label" id="name-label" for="name-input">이름</label>
        <input
          type="text"
          id="name-input"
          class="name-input"
          maxlength="16"
          autocomplete="off"
          spellcheck="false"
          placeholder="이름을 입력하세요"
        >
      </div>

      <button class="start-btn" id="btn-start">현장 투입 →</button>
    </div>
  </div>

  <script src="i18n/strings.js"></script>
  <script>
    /* ── 상태 ─────────────────────────────────────── */
    let selectedLang = 'ko';
    let selectedLook = 0;

    const I18N = {
      ko: { charTitle:'캐릭터 생성', lookLabel:'외형 선택', namePlaceholder:'이름을 입력하세요', nameLabel:'이름', startBtn:'현장 투입 →', back:'← 언어 선택', subtitle:'건설 안전 시뮬레이터' },
      en: { charTitle:'Create Character', lookLabel:'Appearance', namePlaceholder:'Enter your name', nameLabel:'Name', startBtn:'Enter Site →', back:'← Language', subtitle:'Construction Safety Sim' },
      vi: { charTitle:'Tạo nhân vật', lookLabel:'Ngoại hình', namePlaceholder:'Nhập tên của bạn', nameLabel:'Tên', startBtn:'Vào công trường →', back:'← Ngôn ngữ', subtitle:'Mô phỏng an toàn xây dựng' },
      ar: { charTitle:'إنشاء شخصية', lookLabel:'المظهر', namePlaceholder:'أدخل اسمك', nameLabel:'الاسم', startBtn:'← دخول الموقع', back:'← اللغة', subtitle:'محاكي سلامة البناء' },
    };

    /* ── DOM ──────────────────────────────────────── */
    const screenLang = document.getElementById('screen-lang');
    const screenChar = document.getElementById('screen-char');
    const nameInput  = document.getElementById('name-input');

    /* ── 언어 선택 ────────────────────────────────── */
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedLang = btn.dataset.lang;
        applyI18n(selectedLang);
        transition(screenLang, screenChar);
        nameInput.focus();
      });
    });

    function applyI18n(lang) {
      const s = I18N[lang] || I18N.ko;
      document.documentElement.lang = lang;
      document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('char-title').textContent     = s.charTitle;
      document.getElementById('look-label').textContent     = s.lookLabel;
      document.getElementById('name-label').textContent     = s.nameLabel;
      document.getElementById('btn-back').textContent       = s.back;
      document.getElementById('btn-start').textContent      = s.startBtn;
      nameInput.placeholder = s.namePlaceholder;
    }

    /* ── 외형 선택 ────────────────────────────────── */
    document.querySelectorAll('.look-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.look-opt').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedLook = Number(btn.dataset.look);
      });
    });

    /* ── 뒤로 ─────────────────────────────────────── */
    document.getElementById('btn-back').addEventListener('click', () => {
      transition(screenChar, screenLang);
    });

    /* ── 시작 ─────────────────────────────────────── */
    document.getElementById('btn-start').addEventListener('click', startGame);
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });

    function startGame() {
      const name = nameInput.value.trim() || (selectedLang === 'ko' ? '신입' : 'Rookie');
      const params = new URLSearchParams({ lang: selectedLang, name, look: selectedLook });
      window.location.href = 'game.html?' + params.toString();
    }

    /* ── 화면 전환 ────────────────────────────────── */
    function transition(from, to) {
      from.classList.remove('active');
      setTimeout(() => to.classList.add('active'), 60);
    }
  </script>
</body>
</html>

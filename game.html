<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BULSA</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style_extensions.css">
</head>
<body>

<!-- 3D Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="hud-tl">
    <span class="hud-logo-text">BULSA</span>
    <span class="hud-phase" id="hud-phase-text">PHASE 1 · 점검</span>
  </div>
  <div id="hud-tr">
    <span class="hud-si-label" id="hud-si-label">안전지수</span>
    <div class="hud-si-bar-outer"><div id="hud-si-bar"></div></div>
    <span id="hud-si-num">100</span>
  </div>
  <div id="hud-crosshair"></div>
  <div id="hud-interact"></div>
  <div id="hud-mission" id="hud-mission-text"></div>
</div>

<!-- Pointer Lock Blocker -->
<div id="blocker">
  <h2>BULSA</h2>
  <p id="blocker-scenario">줄걸이 · 인양 작업</p>
  <p id="blocker-controls">WASD 이동 · 마우스 시점 · E 상호작용</p>
  <button class="start-btn" id="blocker-btn" onclick="startGame()">클릭하여 시작</button>
</div>

<!-- Hazard Interaction Popup -->
<div id="hazard-popup" class="hidden">
  <div class="popup-box">
    <span class="popup-icon">⚠</span>
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-desc" id="popup-desc"></div>
    <div class="popup-btns">
      <button class="btn-action" id="popup-btn-action"></button>
      <button class="btn-ignore" id="popup-btn-ignore"></button>
    </div>
  </div>
</div>

<!-- Accident Panel -->
<div id="accident-panel" class="hidden">
  <div class="accident-box">
    <div class="accident-title">
      <span>⚠</span>
      <span id="acc-title">사고 발생</span>
    </div>
    <div class="accident-section">
      <h4 id="acc-lbl-desc">사고 상황</h4>
      <p id="acc-desc"></p>
    </div>
    <div class="accident-section">
      <h4 id="acc-lbl-cause">사고 원인</h4>
      <p id="acc-cause"></p>
    </div>
    <div class="accident-section">
      <h4 id="acc-lbl-law">관련 법령</h4>
      <p class="accident-law" id="acc-law"></p>
    </div>
    <div class="accident-section">
      <h4 id="acc-lbl-proc">올바른 절차</h4>
      <ol id="acc-procedure"></ol>
    </div>
    <div class="accident-btns">
      <button class="btn-retry" id="acc-btn-retry" onclick="retryGame()">다시 시도</button>
      <button class="btn-hub" id="acc-btn-hub" onclick="goHub()">허브로</button>
    </div>
  </div>
</div>

<!-- Complete Panel -->
<div id="complete-panel" class="hidden">
  <div class="complete-box">
    <div class="complete-title"><span>✓</span><span id="cmp-title">작업 완료</span></div>
    <p id="cmp-msg" style="font-size:0.88rem; color:var(--muted); line-height:1.6;"></p>
    <div class="complete-stat">
      <span id="cmp-lbl-si">안전지수</span>
      <span class="stat-val stat-good" id="cmp-si">100</span>
    </div>
    <div class="complete-stat">
      <span id="cmp-lbl-fixed">조치 완료</span>
      <span class="stat-val stat-good" id="cmp-fixed">0</span>
    </div>
    <div class="complete-stat">
      <span id="cmp-lbl-ignored">방치</span>
      <span class="stat-val stat-bad" id="cmp-ignored">0</span>
    </div>
    <div class="accident-btns">
      <button class="btn-retry" id="cmp-btn-retry" onclick="retryGame()">다시 시도</button>
      <button class="btn-hub" id="cmp-btn-hub" onclick="goHub()">허브로</button>
    </div>
  </div>
</div>

<!-- Building progress HUD -->
<div id="building-progress" style="position:absolute;bottom:70px;right:20px;font-size:0.72rem;color:var(--muted);font-family:monospace;pointer-events:none;"></div>

<!-- Red flash overlay -->
<div id="flash-overlay"></div>

<!-- Cutscene overlay -->
<div id="cutscene-overlay" class="hidden">
  <div class="cutscene-caption" id="cutscene-caption"></div>
</div>

<!-- Instruction popup (NPC orders) -->
<div id="instruction-popup" class="hidden">
  <div class="inst-box">
    <div class="inst-header">
      <div class="inst-avatar">👷</div>
      <div>
        <div class="inst-npc-name" id="inst-name"></div>
        <div class="inst-npc-role" id="inst-role"></div>
      </div>
      <div class="inst-lang-badge lang-ok" id="inst-lang-badge">🇰🇷 한국어</div>
    </div>
    <div class="inst-speech-bubble hidden" id="inst-speech-bubble"></div>
    <div class="inst-list" id="inst-list"></div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="inst-close-btn" style="flex:1;" id="inst-lang-switch" onclick="toggleInstructionLang()">EN으로 지시</button>
      <button class="inst-close-btn" style="flex:1;" onclick="closeInstructionPopup()">닫기</button>
    </div>
  </div>
</div>

<!-- TBM Panel -->
<div id="tbm-panel" class="hidden">
  <div class="tbm-box">
    <div class="tbm-header">
      <span class="tbm-badge">TBM</span>
      <span class="tbm-title" id="tbm-title">작업 전 안전점검</span>
      <span class="tbm-phase-label" id="tbm-phase-label">Phase 1</span>
    </div>
    <div class="tbm-section">
      <div class="tbm-section-title">오늘의 작업</div>
      <p style="font-size:0.86rem;color:var(--text);" id="tbm-work"></p>
    </div>
    <div class="tbm-section">
      <div class="tbm-section-title">주요 위험요소</div>
      <ul id="tbm-hazards" style="padding-left:18px;font-size:0.84rem;color:var(--muted);line-height:1.8;"></ul>
    </div>
    <div class="tbm-section">
      <div class="tbm-section-title">필수 확인 체크리스트</div>
      <div class="tbm-checklist" id="tbm-checklist"></div>
      <div class="tbm-progress-bar" style="margin-top:8px;">
        <div class="tbm-progress-fill" id="tbm-progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="tbm-section">
      <div class="tbm-section-title">담당자 지정</div>
      <div class="tbm-role-assign" id="tbm-roles"></div>
    </div>
    <button class="tbm-start-btn" id="tbm-start-btn" disabled>작업 시작</button>
  </div>
</div>

<!-- Signboard inventory bar -->
<div id="signboard-bar" class="hidden"></div>
<button class="inv-toggle-btn" id="inv-toggle-btn" onclick="toggleSignboardMode()" title="안전표지 설치">
  🪧 표지 설치
</button>

<!-- Certificate overlay -->
<div id="certificate-overlay" class="hidden">
  <div id="certificate"></div>
  <div class="cert-btns" style="margin-top:12px;">
    <button class="cert-print-btn" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
    <button class="cert-hub-btn" onclick="goHub()">허브로</button>
  </div>
</div>

<!-- Player name input (shown before game start) -->
<div id="name-input-overlay">
  <div class="name-input-title">BULSA</div>
  <p class="name-input-sub">줄걸이 · 인양 작업 시나리오</p>
  <input type="text" id="player-name-input" placeholder="이름을 입력하세요" maxlength="20"
    onkeydown="if(event.key==='Enter') submitPlayerName()">
  <button class="name-submit-btn" onclick="submitPlayerName()">시작</button>
</div>

<!-- Mobile joystick -->
<div id="joystick-wrap">
  <div id="joystick-base">
    <div id="joystick-knob"></div>
  </div>
</div>
<!-- Mobile look area (right side swipe) -->
<div id="mobile-look"></div>

<!-- 1. Three.js — 반드시 모든 모듈보다 먼저 로드 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- 2~4. 데이터/계산 모듈 -->
<script src="i18n/strings.js"></script>
<script src="scenarios/lifting/data.js"></script>
<script src="scenarios/lifting/calc.js"></script>

<!-- 5~9. 코어 엔진 (GAME 객체 초기화) -->
<script src="core/engine.js"></script>
<script src="core/player.js"></script>
<script src="core/interaction.js"></script>
<script src="core/hud.js"></script>
<script src="core/accident.js"></script>

<!-- 10~15. 확장 시스템 (GAME 초기화 이후) -->
<script src="core/npc.js"></script>
<script src="core/instruction.js"></script>
<script src="core/building.js"></script>
<script src="core/tbm.js"></script>
<script src="core/signboard.js"></script>
<script src="core/ending.js"></script>

<!-- 16~17. 시나리오 씬/위험요소 (GAME.scene 존재 이후) -->
<script src="scenarios/lifting/scene.js"></script>
<script src="scenarios/lifting/hazards.js"></script>

<script>
  // ── Player name flow ──────────────────────────────────────
  function submitPlayerName() {
    const input = document.getElementById('player-name-input');
    const name  = (input ? input.value.trim() : '') || (currentLang === 'en' ? 'Player' : '수강자');
    GAME.state.playerName = name;
    document.getElementById('name-input-overlay').classList.add('hidden');
    document.getElementById('blocker').style.display = 'flex';
  }

  // ── Game start (after pointer lock / mobile tap) ─────────
  function startGame() {
    document.getElementById('blocker').style.display = 'none';
    GAME.state.gameStarted = true;
    // Init extension systems now that game is started
    initInstructions();
    initBuilding();
    initSignboard();
    initEnding();
    initTBM();
    if (window.matchMedia('(pointer: fine)').matches) {
      GAME.renderer.domElement.requestPointerLock();
    }
  }

  function retryGame() { window.location.reload(); }
  function goHub()     { window.location.href = 'index.html'; }
</script>

</body>
</html>

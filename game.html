<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>불사(BULSA)</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body class="game">

  <!-- ① 3D 캔버스 -->
  <canvas id="gameCanvas"></canvas>

  <!-- ② 시작 블로커 -->
  <div id="blocker">
    <div class="blocker-title">불사 <span style="color:var(--text-dim);font-size:0.5em">不死</span></div>
    <div id="blocker-scenario">건설 안전 시뮬레이터</div>
    <div class="blocker-divider"></div>
    <div id="blocker-controls">WASD 이동 · 마우스 시점 · E 상호작용 · ESC 일시정지</div>
    <div class="blocker-hint" id="blocker-hint">클릭하여 시작</div>
  </div>

  <!-- ③ HUD -->
  <div id="hud">

    <!-- 命 게이지 (캐릭터 수위) -->
    <div id="life-gauge">
      <div class="life-body">
        <div class="life-water" id="life-water"></div>
        <div class="life-char">命</div>
      </div>
      <div class="life-pct" id="life-pct">100</div>
    </div>

    <!-- 미니맵 -->
    <div id="minimap-wrap">
      <canvas id="minimap-canvas"></canvas>
      <span class="minimap-label">MAP</span>
    </div>

    <!-- 파티창 -->
    <div id="party-bar">
      <div class="party-member" id="party-player">
        <div class="party-avatar" id="party-player-avatar">👷</div>
        <div class="party-info">
          <div class="party-name" id="party-player-name">플레이어</div>
          <div class="party-hp-bar"><div class="party-hp-fill" id="party-player-hp" style="width:100%"></div></div>
        </div>
      </div>
    </div>

  </div><!-- /#hud -->

  <!-- ④ 상호작용 프롬프트 -->
  <div id="interact-prompt">[E] 상호작용</div>

  <!-- ⑤ 액션 알림 토스트 -->
  <div id="action-notif"></div>

  <!-- ⑥ 플래시 오버레이 (사고 연출) -->
  <div id="flash-overlay"></div>

  <!-- ⑦ 모바일 컨트롤 -->
  <div id="joystick-base">
    <div id="joystick-knob"></div>
  </div>
  <div id="mobile-look"></div>

  <!-- ======================================================
       스크립트 로딩 순서 (의존성 순)
       ====================================================== -->
  <script src="https://unpkg.com/three@0.167.1/build/three.min.js"></script>
  <script src="vendor/cannon.min.js"></script>
  <script src="i18n/strings.js"></script>
  <script src="core/engine.js"></script>
  <script src="core/player.js"></script>
  <script src="core/hud.js"></script>
  <script src="core/accident.js"></script>
  <script src="core/sound.js"></script>
  <script src="core/bgm.js"></script>
  <script src="core/ending.js"></script>

  <script>
    /* ─── URL 파라미터 → 언어·이름·외형 ─────────────── */
    (function applyUrlParams() {
      const p = new URLSearchParams(location.search);
      const lang = p.get('lang') || 'ko';
      const name = p.get('name') || (lang === 'ko' ? '신입' : 'Rookie');
      const look = Number(p.get('look') || 0);

      /* 언어 적용 */
      if (typeof setLang === 'function') setLang(lang);

      /* 이름 HUD 반영 */
      const pName = document.getElementById('party-player-name');
      if (pName) pName.textContent = name;
      GAME.state.playerName = name;

      /* 외형 아이콘 */
      const avatars = ['👷','👷‍♀️','🧑‍🔧','👩‍🔧'];
      const av = document.getElementById('party-player-avatar');
      if (av) av.textContent = avatars[look] || avatars[0];

      /* 블로커 텍스트 국제화 */
      const hints = {
        ko: '클릭하여 시작', en: 'Click to Start',
        vi: 'Nhấn để bắt đầu', ar: 'انقر للبدء',
      };
      const controls = {
        ko: 'WASD 이동 · 마우스 시점 · E 상호작용 · ESC 일시정지',
        en: 'WASD Move · Mouse Look · E Interact · ESC Pause',
        vi: 'WASD Di chuyển · Chuột Nhìn · E Tương tác · ESC Dừng',
        ar: 'WASD للتحرك · الماوس للنظر · E للتفاعل · ESC إيقاف',
      };
      const bloHint = document.getElementById('blocker-hint');
      const bloCon  = document.getElementById('blocker-controls');
      if (bloHint) bloHint.textContent = hints[lang]    || hints.ko;
      if (bloCon)  bloCon.textContent  = controls[lang] || controls.ko;
    })();

    /* ─── 블로커 클릭 → 게임 시작 ───────────────────── */
    document.getElementById('blocker').addEventListener('click', function () {
      if (GAME.state.gameStarted) return;
      GAME.state.gameStarted = true;
      this.classList.add('hidden');
      setTimeout(() => { this.style.display = 'none'; }, 500);
      const canvas = document.getElementById('gameCanvas');
      if (canvas) canvas.requestPointerLock();
    });

    /* ─── ESC 일시정지 ───────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.code === 'Escape' && GAME.state.gameStarted && !GAME.state.gameOver) {
        GAME.state.paused = !GAME.state.paused;
        if (GAME.state.paused) document.exitPointerLock();
      }
    });

    /* ─── showActionNotif 전역 함수 ──────────────────── */
    (function initNotif() {
      const el = document.getElementById('action-notif');
      let timer = null;
      window.showActionNotif = function(msg, duration) {
        if (!el) return;
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(timer);
        timer = setTimeout(() => el.classList.remove('show'), duration || 3000);
      };
    })();
  </script>
</body>
</html>

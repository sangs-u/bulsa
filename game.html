<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>불사(BULSA) — 건설 안전 시뮬레이터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root {
      --bg-p: #0D1B2A;
      --bg-s: #162840;
      --bg-t: #2A4A6B;
      --acc:  #8DC63F;
      --dng:  #E85A3A;
      --txt:  #C8D8E8;
      --dim:  #3A6B9A;
      --bdr:  #2A4A6B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-p);
      font-family: 'Nunito', 'Noto Sans KR', sans-serif;
      color: var(--txt);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── 캔버스 ─────────────────────────────────────────── */
    #renderCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    /* ── HUD 레이어 ─────────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #hud-player {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(13,27,42,.75);
      border: 1px solid var(--bdr);
      border-radius: 12px;
      padding: 8px 14px 8px 10px;
      backdrop-filter: blur(6px);
    }
    .hud-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(141,198,63,.2);
      border: 1.5px solid var(--acc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      font-weight: 900;
      color: var(--acc);
    }
    .hud-name {
      font-size: .82rem;
      font-weight: 800;
      color: var(--txt);
    }
    .hud-role {
      font-size: .62rem;
      color: var(--dim);
    }

    /* ── 모바일 조이스틱 ─────────────────────────────────── */
    #joy-base {
      display: none;
      position: fixed;
      bottom: 120px;
      left: 40px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(42,74,107,.45);
      border: 2px solid rgba(141,198,63,.35);
      z-index: 20;
      pointer-events: auto;
    }
    #joy-nub {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(141,198,63,.7);
      border: 2px solid var(--acc);
    }
    #joy-look {
      display: none;
      position: fixed;
      bottom: 0;
      right: 0;
      width: 55%;
      height: 55%;
      z-index: 60; /* dialog(50)보다 위 */
      pointer-events: auto;
      touch-action: none;
    }

    /* ── 대화창 ──────────────────────────────────────────── */
    #dialog {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: linear-gradient(to bottom, rgba(13,27,42,0) 0%, rgba(13,27,42,.96) 14%);
      padding: 20px 20px 28px;
      display: flex;
      align-items: flex-end;
      gap: 16px;
      transition: opacity .35s ease, transform .35s ease;
      pointer-events: auto;
    }
    #dialog.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(24px);
    }

    /* 초상화 열 */
    .dlg-portrait-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .dlg-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 900;
      border: 2px solid;
      flex-shrink: 0;
    }
    .dlg-npc-name {
      font-size: .72rem;
      font-weight: 800;
      color: var(--txt);
      text-align: center;
      white-space: nowrap;
    }
    .dlg-npc-role {
      font-size: .6rem;
      color: var(--dim);
      text-align: center;
      white-space: nowrap;
    }

    /* 텍스트 열 */
    .dlg-content-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #dlg-text {
      font-size: clamp(.88rem, 2.8vw, 1rem);
      font-weight: 600;
      color: var(--txt);
      line-height: 1.65;
      min-height: 2.8em;
      white-space: pre-wrap;
    }
    #dlg-extra { /* 도면/팀 카드 영역 */ }
    #dlg-choices {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .dlg-btn {
      padding: 10px 22px;
      border-radius: 10px;
      border: 1.5px solid var(--bdr);
      background: rgba(255,255,255,.06);
      color: var(--txt);
      font-size: .88rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: all .18s ease;
      touch-action: manipulation;
      pointer-events: auto;
    }
    .dlg-btn:hover {
      border-color: var(--acc);
      background: rgba(141,198,63,.12);
      color: var(--acc);
    }
    .dlg-btn.accent {
      background: var(--acc);
      border-color: var(--acc);
      color: #0D1B2A;
      box-shadow: 0 4px 18px rgba(141,198,63,.32);
    }
    .dlg-btn.accent:hover {
      background: #9ed647;
      transform: translateY(-2px);
      box-shadow: 0 7px 24px rgba(141,198,63,.45);
      color: #0D1B2A;
    }

    /* 도면 */
    .blueprint {
      display: flex;
      gap: 14px;
      align-items: center;
      background: rgba(13,27,42,.85);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      padding: 10px 14px;
    }
    .bp-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: 1.4fr 1fr;
      gap: 3px;
      width: 110px;
      height: 72px;
    }
    .bp-room {
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .5rem;
      font-weight: 700;
    }
    .bp-room.main  { background: rgba(141,198,63,.12); border: 1px solid rgba(141,198,63,.4); color: rgba(141,198,63,.85); }
    .bp-room.sub   { background: rgba(58,107,154,.12); border: 1px solid rgba(58,107,154,.5); color: rgba(58,107,154,.9); }
    .bp-room.base  { grid-column: 1/-1; background: rgba(232,90,58,.1); border: 1px solid rgba(232,90,58,.35); color: rgba(232,90,58,.8); }
    .bp-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .bp-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .72rem;
      font-weight: 700;
      color: var(--txt);
    }
    .bp-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* 팀 카드 */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .team-card {
      background: rgba(22,40,64,.9);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      padding: 9px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .tc-av {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .95rem;
      font-weight: 900;
      border: 1.5px solid currentColor;
    }
    .tc-name { font-size: .68rem; font-weight: 800; color: var(--txt); text-align: center; }
    .tc-role { font-size: .58rem; color: var(--dim); text-align: center; line-height: 1.3; }
    .tc-tag  {
      font-size: .58rem; font-weight: 800;
      padding: 2px 7px; border-radius: 5px;
    }

    /* ── 테스트 버튼 (命 게이지 ±) ────────────────────────── */
    #test-panel {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }
    .test-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--bdr);
      background: rgba(13,27,42,.82);
      color: var(--txt);
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .test-btn.minus { color: #E85A3A; border-color: #E85A3A44; }
    .test-btn.plus  { color: #8DC63F; border-color: #8DC63F44; }

    /* ── 위험 플래시 오버레이 ──────────────────────────────── */
    #danger-flash {
      position: fixed;
      inset: 0;
      background: rgba(232,90,58,0);
      pointer-events: none;
      z-index: 100;
    }
    #danger-flash.active {
      animation: flashPulse .8s ease-out forwards;
    }
    @keyframes flashPulse {
      0%   { background: rgba(232,90,58,.52); }
      100% { background: rgba(232,90,58,0);   }
    }

    /* ── 안전지수 배지 (좌상단) ─────────────────────────────── */
    #safety-badge {
      position: absolute;
      top: 60px;
      left: 16px;
      background: rgba(13,27,42,.78);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      padding: 4px 12px;
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .safety-label {
      font-size: .62rem;
      font-weight: 800;
      color: var(--dim);
      letter-spacing: .05em;
    }
    #safety-val {
      font-size: .9rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--acc);
      min-width: 2.2ch;
      text-align: right;
    }

    /* ── 파티창 (우상단) ─────────────────────────────────────── */
    #party-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
      background: rgba(13,27,42,.72);
      border: 1px solid var(--bdr);
      border-radius: 12px;
      padding: 8px 12px;
      backdrop-filter: blur(6px);
    }
    .party-member {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .party-av {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .68rem;
      font-weight: 900;
    }
    .party-life-wrap {
      width: 5px;
      height: 36px;
      background: rgba(255,255,255,.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .party-life-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0%;
      border-radius: 3px;
      transition: height .25s ease, background .3s ease;
    }

    /* 반응형 */
    @media (max-width: 520px) {
      .team-grid  { grid-template-columns: repeat(2, 1fr); }
      .bp-grid    { width: 80px; height: 56px; }
      #dialog     { padding: 16px 14px 22px; gap: 12px; }
      .dlg-avatar { width: 46px; height: 46px; font-size: 1.15rem; }
      #party-panel { gap: 7px; padding: 6px 9px; }
      .party-av   { width: 22px; height: 22px; font-size: .6rem; }
    }
  </style>
</head>
<body>

<!-- ① 3D 캔버스 (Babylon.js 렌더 타겟) -->
<canvas id="renderCanvas"></canvas>
<div id="_dbg" style="position:fixed;top:4px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#8DC63F;font-size:11px;font-family:monospace;padding:3px 8px;border-radius:4px;z-index:9998;pointer-events:none">로딩 중...</div>

<!-- ② 위험 플래시 -->
<div id="danger-flash"></div>

<!-- ③ HUD -->
<div id="hud">

  <!-- 좌상단: 플레이어 배지 -->
  <div id="hud-player">
    <div class="hud-avatar" id="hud-av">新</div>
    <div>
      <div class="hud-name"  id="hud-name">로딩 중...</div>
      <div class="hud-role">신입 현장인부</div>
    </div>
  </div>

  <!-- 상단 중앙: 테스트 버튼 -->
  <div id="test-panel">
    <button class="test-btn minus" onclick="lifeDamage(10)">−</button>
    <button class="test-btn plus"  onclick="lifeHeal(10)">＋</button>
  </div>

  <!-- 좌상단: 安全지수 (플레이어 배지 아래) -->
  <div id="safety-badge">
    <span class="safety-label">命</span>
    <span id="safety-val">100</span>
  </div>

  <!-- 우상단: 파티창 -->
  <div id="party-panel">
    <div class="party-member">
      <div class="party-av" style="color:#F97316">김</div>
      <div class="party-life-wrap"><div class="party-life-bar" id="party-life-0"></div></div>
    </div>
    <div class="party-member">
      <div class="party-av" style="color:#FCD34D">이</div>
      <div class="party-life-wrap"><div class="party-life-bar" id="party-life-1"></div></div>
    </div>
    <div class="party-member">
      <div class="party-av" style="color:#C8D8E8">박</div>
      <div class="party-life-wrap"><div class="party-life-bar" id="party-life-2"></div></div>
    </div>
    <div class="party-member">
      <div class="party-av" style="color:#8DC63F">응</div>
      <div class="party-life-wrap"><div class="party-life-bar" id="party-life-3"></div></div>
    </div>
  </div>

</div>

<!-- ④ 모바일 조이스틱 -->
<div id="joy-base"><div id="joy-nub"></div></div>
<div id="joy-look"></div>

<!-- ⑤ NPC 대화창 -->
<div id="dialog" class="hidden">

  <!-- 좌: NPC 초상화 -->
  <div class="dlg-portrait-col">
    <div class="dlg-avatar" id="dlg-avatar">박</div>
    <div class="dlg-npc-name" id="dlg-npc-name">박 부장</div>
    <div class="dlg-npc-role" id="dlg-npc-role">발주처 대표</div>
  </div>

  <!-- 우: 텍스트 + 선택지 -->
  <div class="dlg-content-col">
    <div id="dlg-text"></div>
    <div id="dlg-extra"></div>
    <div id="dlg-choices"></div>
  </div>

</div>

<!-- ======================================================
     스크립트 로딩 순서
     ====================================================== -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<script>
/* ─── HUD 초기화 ─────────────────────────────────────────── */
(function applyHud() {
  const name  = GAME.state.playerName || '신입';
  const look  = GAME.state.look;
  const avColors = ['#F97316','#FCD34D','#E8E8E8','#8DC63F'];
  const avEl  = document.getElementById('hud-av');
  const nameEl = document.getElementById('hud-name');

  nameEl.textContent = name;
  avEl.textContent   = name[0] || '新';
  avEl.style.borderColor  = avColors[look] || avColors[0];
  avEl.style.color        = avColors[look] || avColors[0];
  avEl.style.background   = (avColors[look] || '#F97316') + '22';
})();

/* ─── 모바일 조이스틱 표시 ───────────────────────────────── */

  document.getElementById('joy-base').style.display = 'block';
  // joy-look은 대화 종료 후 _endDialog()에서 표시
}

const TEAM_DATA = {
  ko: [
    { av: '김', color: '#F97316', name: '김철수', role: '숙련공\n10년차',  tag: '안정',   tagBg: 'rgba(141,198,63,.15)',  tagColor: '#8DC63F' },
    { av: '이', color: '#FCD34D', name: '이영수', role: '반숙련공\n3년차', tag: '보통',   tagBg: 'rgba(252,211,77,.15)',  tagColor: '#FCD34D' },
    { av: '박', color: '#C8D8E8', name: '박신입', role: '신입\n1년차',    tag: '주의',   tagBg: 'rgba(232,90,58,.15)',   tagColor: '#E85A3A' },
    { av: '응', color: '#8DC63F', name: '응우옌', role: '외국인\n근로자',  tag: '언어',   tagBg: 'rgba(58,107,154,.15)',  tagColor: '#3A6B9A' },
  ],
  en: [
    { av: 'K', color: '#F97316', name: 'Kim Chulsoo', role: 'Expert\n10yr',      tag: 'Stable', tagBg: 'rgba(141,198,63,.15)', tagColor: '#8DC63F' },
    { av: 'L', color: '#FCD34D', name: 'Lee Youngsoo', role: 'Semi-exp\n3yr',   tag: 'Mid',    tagBg: 'rgba(252,211,77,.15)', tagColor: '#FCD34D' },
    { av: 'P', color: '#C8D8E8', name: 'Park Rookie',  role: 'Newbie\n1yr',     tag: 'Caution',tagBg: 'rgba(232,90,58,.15)',  tagColor: '#E85A3A' },
    { av: 'N', color: '#8DC63F', name: 'Nguyen',        role: 'Foreign\nWorker', tag: 'Lang',   tagBg: 'rgba(58,107,154,.15)', tagColor: '#3A6B9A' },
  ],
};

const dlgEl    = document.getElementById('dialog');
const avEl     = document.getElementById('dlg-avatar');
const nameEl   = document.getElementById('dlg-npc-name');
const roleEl   = document.getElementById('dlg-npc-role');
const textEl   = document.getElementById('dlg-text');
const extraEl  = document.getElementById('dlg-extra');
const choicesEl = document.getElementById('dlg-choices');

let twTimer = null;

function typewrite(el, str, cb, speed) {
  clearInterval(twTimer);
  el.textContent = '';
  let i = 0;
  twTimer = setInterval(() => {
    el.textContent += str[i++];
    if (i >= str.length) { clearInterval(twTimer); if (cb) cb(); }
  }, speed || 28);
}

function _hex2rgba(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function _getBlueprintHTML() {
  const lang = DLANG;
  const labels = {
    ko: { main: '사무/주거', stair: '계단', base: '지하주차', sz: '200㎡', fl: '지하1+지상5층', noise: '소음 주의' },
    en: { main: 'Office/Res', stair: 'Stair', base: 'Parking B1', sz: '200m²', fl: 'B1+5F', noise: 'Noise Zone' },
    vi: { main: 'Văn phòng', stair: 'Cầu thang', base: 'Đỗ xe B1', sz: '200m²', fl: 'T.hầm+5T', noise: 'Khu ồn' },
    ar: { main: 'مكتب/سكن', stair: 'سلّم', base: 'موقف B1', sz: '200م²', fl: 'ب1+5طوابق', noise: 'منطقة ضوضاء' },
  };
  const L = labels[lang] || labels.ko;
  return `<div class="blueprint">
    <div class="bp-grid">
      <div class="bp-room main">${L.main}</div>
      <div class="bp-room sub">${L.stair}</div>
      <div class="bp-room base">${L.base}</div>
    </div>
    <div class="bp-meta">
      <div class="bp-row"><span class="bp-dot" style="background:#8DC63F"></span>${L.sz}</div>
      <div class="bp-row"><span class="bp-dot" style="background:#3A6B9A"></span>${L.fl}</div>
      <div class="bp-row"><span class="bp-dot" style="background:#E85A3A"></span>${L.noise}</div>
    </div>
  </div>`;
}

function _getTeamHTML() {
  const members = (TEAM_DATA[DLANG] || TEAM_DATA.ko);
  return `<div class="team-grid">${members.map(m => `
    <div class="team-card">
      <div class="tc-av" style="color:${m.color};border-color:${m.color};background:${_hex2rgba(m.color,.12)}">${m.av}</div>
      <div class="tc-name">${m.name}</div>
      <div class="tc-role">${m.role}</div>
      <div class="tc-tag" style="background:${m.tagBg};color:${m.tagColor}">${m.tag}</div>
    </div>`).join('')}</div>`;
}

function showStep(idx) {
  if (idx === 'start') { _endDialog(); return; }
  const flow = FLOWS[DLANG] || FLOWS.ko;
  if (idx >= flow.length) { _endDialog(); return; }
  const step = flow[idx];

  // 초상화
  avEl.textContent = step.npc[0];
  avEl.style.borderColor = step.color;
  avEl.style.background  = _hex2rgba(step.color, 0.14);
  avEl.style.color       = step.color;
  nameEl.textContent = step.npc;
  roleEl.textContent = step.role;

  // 텍스트 타이프라이터
  typewrite(textEl, step.text, null, 26);

  // 추가 콘텐츠
  extraEl.innerHTML = step.extra === 'blueprint' ? _getBlueprintHTML()
                    : step.extra === 'team'      ? _getTeamHTML()
                    : '';

  // 선택지 버튼
  choicesEl.innerHTML = '';
  step.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className   = 'dlg-btn' + (c.accent ? ' accent' : '');
    btn.textContent = c.text;
    btn.addEventListener('click', () => showStep(c.next));
    btn.addEventListener('touchstart', e => { e.preventDefault(); showStep(c.next); }, { passive: false });
    choicesEl.appendChild(btn);
  });
}

function _endDialog() {
  dlgEl.classList.add('hidden');
  if (typeof unlockPlayer === 'function') unlockPlayer();
  if ('ontouchstart' in window) {
    document.getElementById('joy-look').style.display = 'block';
  }
}

// 씬 준비 후 대화 시작
window.addEventListener('load', () => {
  setTimeout(() => {
    dlgEl.classList.remove('hidden');
    showStep(0);
  }, 800);
});
</script>
</body>

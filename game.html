<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>불사(BULSA) — 건설 안전 시뮬레이터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root {
      --bg-p: #0D1B2A;
      --bg-s: #162840;
      --bg-t: #2A4A6B;
      --acc:  #8DC63F;
      --dng:  #E85A3A;
      --txt:  #C8D8E8;
      --dim:  #3A6B9A;
      --bdr:  #2A4A6B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-p);
      font-family: 'Nunito', 'Noto Sans KR', sans-serif;
      color: var(--txt);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── 캔버스 ─────────────────────────────────────────── */
    #renderCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    /* ── HUD 레이어 ─────────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #hud-player {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(13,27,42,.75);
      border: 1px solid var(--bdr);
      border-radius: 12px;
      padding: 8px 14px 8px 10px;
      backdrop-filter: blur(6px);
    }
    .hud-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(141,198,63,.2);
      border: 1.5px solid var(--acc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      font-weight: 900;
      color: var(--acc);
    }
    .hud-name {
      font-size: .82rem;
      font-weight: 800;
      color: var(--txt);
    }
    .hud-role {
      font-size: .62rem;
      color: var(--dim);
    }

    /* ── 모바일 조이스틱 ─────────────────────────────────── */
    #joy-base {
      display: none;
      position: fixed;
      bottom: 120px;
      left: 40px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(42,74,107,.45);
      border: 2px solid rgba(141,198,63,.35);
      z-index: 20;
      pointer-events: auto;
    }
    #joy-nub {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(141,198,63,.7);
      border: 2px solid var(--acc);
    }
    #joy-look {
      display: none;
      position: fixed;
      bottom: 0;
      right: 0;
      width: 55%;
      height: 55%;
      z-index: 60; /* dialog(50)보다 위 */
      pointer-events: auto;
      touch-action: none;
    }

    /* ── 대화창 ──────────────────────────────────────────── */
    #dialog {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: linear-gradient(to bottom, rgba(13,27,42,0) 0%, rgba(13,27,42,.96) 14%);
      padding: 20px 20px 28px;
      display: flex;
      align-items: flex-end;
      gap: 16px;
      transition: opacity .35s ease, transform .35s ease;
      pointer-events: auto;
    }
    #dialog.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(24px);
    }

    /* 초상화 열 */
    .dlg-portrait-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .dlg-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 900;
      border: 2px solid;
      flex-shrink: 0;
    }
    .dlg-npc-name {
      font-size: .72rem;
      font-weight: 800;
      color: var(--txt);
      text-align: center;
      white-space: nowrap;
    }
    .dlg-npc-role {
      font-size: .6rem;
      color: var(--dim);
      text-align: center;
      white-space: nowrap;
    }

    /* 텍스트 열 */
    .dlg-content-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #dlg-text {
      font-size: clamp(.88rem, 2.8vw, 1rem);
      font-weight: 600;
      color: var(--txt);
      line-height: 1.65;
      min-height: 2.8em;
      white-space: pre-wrap;
    }
    #dlg-extra { /* 도면/팀 카드 영역 */ }
    #dlg-choices {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .dlg-btn {
      padding: 10px 22px;
      border-radius: 10px;
      border: 1.5px solid var(--bdr);
      background: rgba(255,255,255,.06);
      color: var(--txt);
      font-size: .88rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: all .18s ease;
      touch-action: manipulation;
      pointer-events: auto;
    }
    .dlg-btn:hover {
      border-color: var(--acc);
      background: rgba(141,198,63,.12);
      color: var(--acc);
    }
    .dlg-btn.accent {
      background: var(--acc);
      border-color: var(--acc);
      color: #0D1B2A;
      box-shadow: 0 4px 18px rgba(141,198,63,.32);
    }
    .dlg-btn.accent:hover {
      background: #9ed647;
      transform: translateY(-2px);
      box-shadow: 0 7px 24px rgba(141,198,63,.45);
      color: #0D1B2A;
    }

    /* ── NPC 인터랙션 프롬프트 ─────────────────────────────── */
    #interact-prompt {
      display: none;
      position: fixed;
      bottom: 38%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 65;  /* joy-look(60)보다 위 */
      align-items: center;
      gap: 10px;
      background: rgba(13,27,42,.88);
      border: 1.5px solid var(--acc);
      border-radius: 14px;
      padding: 10px 22px 10px 14px;
      backdrop-filter: blur(8px);
      cursor: pointer;
      user-select: none;
      animation: promptPop .22s ease;
    }
    @keyframes promptPop {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .ip-key {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1.5px solid var(--acc);
      background: rgba(141,198,63,.18);
      color: var(--acc);
      font-size: .95rem;
      font-weight: 900;
      flex-shrink: 0;
    }
    .ip-label {
      font-size: .88rem;
      font-weight: 800;
      color: var(--txt);
    }
    /* 모바일: 키 힌트 숨기고 전체가 탭 타겟 */
    @media (pointer: coarse) {
      #interact-prompt { bottom: 42%; padding: 12px 26px; }
      .ip-key { display: none; }
    }

    #ctx-action-btn {
      position: fixed;
      bottom: 26%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 65;
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(13,27,42,.88);
      border: 1.5px solid #8DC63F;
      border-radius: 14px;
      padding: 10px 22px 10px 14px;
      backdrop-filter: blur(8px);
      cursor: pointer;
      user-select: none;
    }
    #ctx-action-btn.show { display: flex; }
    @media (pointer: coarse) {
      #ctx-action-btn { bottom: 28%; padding: 12px 26px; }
      #ctx-action-btn .ip-key { display: none; }
    }
    #carry-hud {
      position: absolute;
      top: 100px;
      left: 16px;
      background: rgba(13,27,42,.78);
      border: 1px solid #8DC63F;
      border-radius: 8px;
      padding: 6px 12px;
      display: none;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(6px);
      z-index: 55;
    }
    .carry-icon { width:16px; height:16px; border-radius:3px; background:#8DC63F; flex-shrink:0; }
    .carry-label { font-size:.58rem; color:var(--dim); letter-spacing:.06em; }
    .carry-name  { font-size:.82rem; font-weight:800; color:var(--acc); }
    #install-checklist {
      position: absolute;
      top: 100px;
      right: 16px;
      background: rgba(13,27,42,.78);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      padding: 9px 12px;
      min-width: 130px;
      display: none;
      backdrop-filter: blur(6px);
      z-index: 55;
    }
    .cl-title { font-size:.65rem; color:var(--dim); letter-spacing:.06em; margin-bottom:5px; font-weight:800; }
    .cl-row   { display:flex; align-items:center; gap:8px; padding:2px 0; }
    .cl-icon  { color:#8DC63F; font-size:.8rem; }
    .cl-label { font-size:.76rem; color:var(--txt); flex:1; }
    .cl-count { font-size:.76rem; font-weight:800; color:var(--acc); font-variant-numeric:tabular-nums; }

    #excavator-hint {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(13,27,42,.88);
      border: 1px solid #FCD34D;
      border-radius: 10px;
      padding: 10px 18px;
      backdrop-filter: blur(6px);
      font-size: .78rem;
      font-weight: 700;
      color: #C8D8E8;
      z-index: 55;
      text-align: center;
      line-height: 1.5;
      display: none;
    }
    .exc-hint-title { color:#FCD34D; font-weight:900; margin-bottom:4px; display:block; }
    #exc-bucket-roll {
      position: fixed;
      bottom: 130px;
      right: 30px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(252,211,77,.3);
      border: 2.5px solid #FCD34D;
      color: #FCD34D;
      font-size: .7rem;
      font-weight: 900;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 55;
      touch-action: none;
      user-select: none;
    }
    #excavation-progress {
      position: absolute;
      top: 100px;
      right: 16px;
      background: rgba(13,27,42,.78);
      border: 1px solid #FCD34D;
      border-radius: 10px;
      padding: 9px 14px;
      min-width: 160px;
      display: none;
      backdrop-filter: blur(6px);
      z-index: 55;
    }
    .exc-prog-title { font-size:.65rem; color:#3A6B9A; letter-spacing:.06em; margin-bottom:5px; font-weight:800; }
    .exc-prog-bar-wrap { background:rgba(255,255,255,.08); height:8px; border-radius:4px; overflow:hidden; }
    #exc-progress-bar { background:#FCD34D; height:100%; width:0%; transition:width .3s; }
    .exc-prog-val { font-size:.7rem; color:#C8D8E8; font-weight:700; margin-top:5px; text-align:right; }

    /* 난간 시스템 */
    #railing-toggle-btn {
      position: fixed;
      bottom: 150px;
      right: 16px;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: rgba(13,27,42,.88);
      border: 2px solid #8DC63F;
      color: #8DC63F;
      font-size: .6rem;
      font-weight: 900;
      letter-spacing: .04em;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2px;
      z-index: 56;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(6px);
    }
    #railing-toggle-btn::before {
      content: '';
      width: 22px;
      height: 14px;
      border: 2px solid currentColor;
      border-bottom: 4px solid currentColor;
      border-radius: 1px;
    }
    #railing-toggle-btn.active { background: rgba(141,198,63,.22); }

    #railing-hud {
      position: fixed;
      bottom: 220px;
      right: 16px;
      background: rgba(13,27,42,.88);
      border: 1.5px solid #8DC63F;
      border-radius: 12px;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 8px;
      z-index: 56;
      backdrop-filter: blur(6px);
      min-width: 140px;
    }
    .rl-mode-row { display: flex; gap: 6px; }
    .rl-btn {
      flex: 1;
      padding: 8px 10px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--bdr);
      border-radius: 6px;
      color: var(--txt);
      font-size: .72rem;
      font-weight: 800;
      cursor: pointer;
      transition: all .15s;
    }
    .rl-btn:hover { border-color: #8DC63F; }
    .rl-btn.active { background: rgba(141,198,63,.22); border-color: #8DC63F; color: #8DC63F; }
    #railing-mode-lbl {
      font-size: .68rem;
      color: var(--dim);
      letter-spacing: .04em;
      text-align: center;
      font-weight: 700;
    }
    .rl-action-row { display: flex; gap: 6px; }
    .rl-place-btn {
      flex: 1;
      padding: 9px;
      background: #8DC63F;
      border: none;
      border-radius: 6px;
      color: #0D1B2A;
      font-size: .78rem;
      font-weight: 900;
      cursor: pointer;
    }
    .rl-remove-btn {
      width: 40px;
      padding: 9px;
      background: rgba(232,90,58,.22);
      border: 1px solid #E85A3A;
      border-radius: 6px;
      color: #E85A3A;
      font-size: .8rem;
      font-weight: 900;
      cursor: pointer;
    }
    #railing-msg {
      position: fixed;
      top: 180px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(13,27,42,.92);
      border: 1px solid #FCD34D;
      border-radius: 8px;
      padding: 8px 16px;
      color: #FCD34D;
      font-size: .82rem;
      font-weight: 700;
      z-index: 70;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    /* 도면 */
    .blueprint {
      display: flex;
      gap: 14px;
      align-items: center;
      background: rgba(13,27,42,.85);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      padding: 10px 14px;
    }
    .bp-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: 1.4fr 1fr;
      gap: 3px;
      width: 110px;
      height: 72px;
    }
    .bp-room {
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .5rem;
      font-weight: 700;
    }
    .bp-room.main  { background: rgba(141,198,63,.12); border: 1px solid rgba(141,198,63,.4); color: rgba(141,198,63,.85); }
    .bp-room.sub   { background: rgba(58,107,154,.12); border: 1px solid rgba(58,107,154,.5); color: rgba(58,107,154,.9); }
    .bp-room.base  { grid-column: 1/-1; background: rgba(232,90,58,.1); border: 1px solid rgba(232,90,58,.35); color: rgba(232,90,58,.8); }
    .bp-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .bp-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .72rem;
      font-weight: 700;
      color: var(--txt);
    }
    .bp-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* 팀 카드 */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .team-card {
      background: rgba(22,40,64,.9);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      padding: 9px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .tc-av {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .95rem;
      font-weight: 900;
      border: 1.5px solid currentColor;
    }
    .tc-name { font-size: .68rem; font-weight: 800; color: var(--txt); text-align: center; }
    .tc-role { font-size: .58rem; color: var(--dim); text-align: center; line-height: 1.3; }
    .tc-tag  {
      font-size: .58rem; font-weight: 800;
      padding: 2px 7px; border-radius: 5px;
    }

    /* ── 씬 전환 페이드 ─────────────────────────────────────── */
    #scene-fade {
      position: fixed;
      inset: 0;
      background: #0D1B2A;
      opacity: 0;
      pointer-events: none;
      transition: opacity .42s ease;
      z-index: 200;
    }
    #scene-fade.in {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── 위험 플래시 오버레이 ──────────────────────────────── */
    #danger-flash {
      position: fixed;
      inset: 0;
      background: rgba(232,90,58,0);
      pointer-events: none;
      z-index: 100;
    }
    #danger-flash.active {
      animation: flashPulse .8s ease-out forwards;
    }
    @keyframes flashPulse {
      0%   { background: rgba(232,90,58,.52); }
      100% { background: rgba(232,90,58,0);   }
    }

    /* ── 안전지수 배지 (좌상단) ─────────────────────────────── */
    #safety-badge {
      position: absolute;
      top: 60px;
      left: 16px;
      background: rgba(13,27,42,.78);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      padding: 4px 12px;
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .safety-label {
      font-size: .62rem;
      font-weight: 800;
      color: var(--dim);
      letter-spacing: .05em;
    }
    #safety-val {
      font-size: .9rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--acc);
      min-width: 2.2ch;
      text-align: right;
    }

    /* ── 파티창 (우상단) ─────────────────────────────────────── */
    #party-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
      background: rgba(13,27,42,.72);
      border: 1px solid var(--bdr);
      border-radius: 12px;
      padding: 8px 12px;
      backdrop-filter: blur(6px);
    }
    .party-member {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .party-av {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .68rem;
      font-weight: 900;
    }
    .party-life-wrap {
      width: 5px;
      height: 36px;
      background: rgba(255,255,255,.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .party-life-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0%;
      border-radius: 3px;
      transition: height .25s ease, background .3s ease;
    }

    /* 반응형 */
    @media (max-width: 520px) {
      .team-grid  { grid-template-columns: repeat(2, 1fr); }
      .bp-grid    { width: 80px; height: 56px; }
      #dialog     { padding: 16px 14px 22px; gap: 12px; }
      .dlg-avatar { width: 46px; height: 46px; font-size: 1.15rem; }
      #party-panel { gap: 7px; padding: 6px 9px; }
      .party-av   { width: 22px; height: 22px; font-size: .6rem; }
    }

    /* ── 사전조사 선택 카드 ──────────────────────────────────── */
    .survey-cards {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .survey-card {
      flex: 1;
      min-width: 130px;
      padding: 12px 10px;
      background: rgba(22,40,64,.9);
      border: 1.5px solid var(--bdr);
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: border-color .18s, background .18s;
      user-select: none;
    }
    .survey-card:hover  { border-color: var(--acc); background: rgba(141,198,63,.08); }
    .survey-card.sel    { border-color: var(--acc); background: rgba(141,198,63,.15); }
    .sc-title { font-size: .84rem; font-weight: 800; color: var(--txt); margin-bottom: 4px; }
    .sc-desc  { font-size: .68rem; color: var(--dim); line-height: 1.4; }
    .sc-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: .65rem;
      font-weight: 800;
    }

    /* ── 토질 결과 박스 ────────────────────────────────────── */
    .soil-result-box {
      margin-top: 6px;
      padding: 10px 14px;
      background: rgba(22,40,64,.9);
      border: 1px solid var(--bdr);
      border-radius: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .soil-dot   { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .soil-label { font-size: .82rem; font-weight: 800; color: var(--txt); }
    .soil-sub   { font-size: .68rem; color: var(--dim); margin-top: 3px; }

    /* ── 안전조치 멀티셀렉트 ────────────────────────────────── */
    .safety-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .safety-chip {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--bdr);
      background: rgba(255,255,255,.04);
      color: var(--txt);
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .safety-chip.sel { border-color: var(--acc); background: rgba(141,198,63,.18); color: var(--acc); }
    .safety-done-btn {
      display: block;
      margin-top: 10px;
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: 1.5px solid var(--acc);
      background: rgba(141,198,63,.14);
      color: var(--acc);
      font-size: .86rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: all .18s;
    }
    .safety-done-btn:hover { background: var(--acc); color: #0D1B2A; }

    /* ── 작업계획서 / 보고서 오버레이 ──────────────────────── */
    #doc-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0,0,0,.86);
      display: none;
      align-items: center;
      justify-content: center;
    }
    #doc-overlay.show { display: flex; }
    .doc-paper {
      background: #F8F7F2;
      color: #1a1a1a;
      width: min(620px, 94vw);
      max-height: 84vh;
      overflow-y: auto;
      border-radius: 3px;
      padding: 36px 40px 24px;
      font-family: 'Noto Sans KR', 'Nunito', sans-serif;
      box-shadow: 0 12px 56px rgba(0,0,0,.65);
      font-size: .82rem;
    }
    .doc-header      { text-align: center; padding-bottom: 14px; border-bottom: 2px solid #333; margin-bottom: 18px; }
    .doc-title       { font-size: 1.08rem; font-weight: 900; letter-spacing: .12em; }
    .doc-sub         { font-size: .72rem; color: #555; margin-top: 4px; }
    .doc-section     { font-size: .78rem; font-weight: 800; color: #333; margin: 14px 0 6px; border-left: 3px solid #E85A3A; padding-left: 8px; }
    .doc-table       { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
    .doc-table td    { border: 1px solid #bbb; padding: 7px 10px; vertical-align: top; }
    .doc-table .dlbl { background: #EBEBDE; font-weight: 700; width: 32%; color: #333; }
    .doc-table .dval { color: #1a1a1a; }
    .doc-close-row   { text-align: center; margin-top: 16px; }
    .doc-close-btn {
      padding: 9px 28px;
      border: 2px solid #333;
      background: none;
      font-size: .88rem;
      font-weight: 800;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
      color: #333;
    }
    .doc-close-btn:hover { background: #333; color: #fff; }
  </style>
</head>

<script>
/* ─── HUD 초기화 ─────────────────────────────────────────── */
(function applyHud() {

})();

/* ─── 모바일 조이스틱 표시 ───────────────────────────────── */
if ('ontouchstart' in window) {
  document.getElementById('joy-base').style.display = 'block';

}

/* ─── 대화 시스템 ────────────────────────────────────────── */
const DLANG = GAME.state.lang || 'ko';

const FLOWS = {

    {
      npc: '박 부장', role: '발주처 대표',

      text: '"안녕하세요. 이 부지에 5층 건물을 올려주세요.\n예산 5억 원, 공기는 90일입니다."',

      text: '"부지 면적 200㎡, 지하 1층·지상 5층 규모입니다.\n인근이 주거지역이니 소음 민원에 주의해 주세요."',

    },
    {
      npc: '브리핑', role: '현장 정보',
      color: '#8DC63F',
      text: '함께할 팀원들을 소개합니다.\n각 팀원의 숙련도와 특성을 파악하세요.',
      extra: 'team',
      choices: [{ text: '튜토리얼 시작!', next: 'start', accent: true }],
    },
  ],
  en: [
    {
      npc: 'Director Park', role: 'Client',
      color: '#3A9AE8',
      text: '"Hello. Please build a 5-story building on this site.\nBudget: ₩500M, deadline: 90 days."',
      choices: [{ text: 'See blueprint', next: 1 }],
    },
    {
      npc: 'Director Park', role: 'Client',
      color: '#3A9AE8',
      text: '"Site area: 200m², B1F + 5F above ground.\nNearby residential area — please mind noise complaints."',
      extra: 'blueprint',
      choices: [{ text: 'Understood', next: 2 }],
    },
    {
      npc: 'Briefing', role: 'Site Info',
      color: '#8DC63F',
      text: "Meet your team members.\nLearn each member's skills and traits.",
      extra: 'team',
      choices: [{ text: 'Start Tutorial!', next: 'start', accent: true }],
    },
  ],
  vi: [
    {
      npc: 'Giám đốc Park', role: 'Chủ đầu tư',
      color: '#3A9AE8',
      text: '"Xin chào. Hãy xây tòa nhà 5 tầng trên lô đất này.\nNgân sách: 500 triệu KRW, tiến độ: 90 ngày."',
      choices: [{ text: 'Xem bản vẽ', next: 1 }],
    },
    {
      npc: 'Giám đốc Park', role: 'Chủ đầu tư',
      color: '#3A9AE8',
      text: '"Diện tích 200m², tầng hầm 1 + 5 tầng trên mặt đất.\nKhu dân cư gần đây — chú ý tiếng ồn."',
      extra: 'blueprint',

    {
      npc: 'Thông báo', role: 'Thông tin hiện trường',
      color: '#8DC63F',

      extra: 'team',
      choices: [{ text: 'Bắt đầu hướng dẫn!', next: 'start', accent: true }],

  ],
  ar: [
    {
      npc: 'المدير بارك', role: 'صاحب العمل',
      color: '#3A9AE8',
      text: '"مرحباً. من فضلك ابنِ مبنى من 5 طوابق على هذا الموقع.\nالميزانية: 500 مليون وون، المدة: 90 يوماً."',
      choices: [{ text: 'عرض المخطط', next: 1 }],
    },
    {
      npc: 'المدير بارك', role: 'صاحب العمل',
      color: '#3A9AE8',
      text: '"مساحة الموقع 200م²، طابق سفلي + 5 طوابق علوية.\nالمنطقة المجاورة سكنية — انتبه للضوضاء."',
      extra: 'blueprint',

const TEAM_DATA = {
  ko: [
    { av: '김', color: '#F97316', name: '김철수', role: '숙련공\n10년차',  tag: '안정',   tagBg: 'rgba(141,198,63,.15)',  tagColor: '#8DC63F' },
    { av: '이', color: '#FCD34D', name: '이영수', role: '반숙련공\n3년차', tag: '보통',   tagBg: 'rgba(252,211,77,.15)',  tagColor: '#FCD34D' },
    { av: '박', color: '#C8D8E8', name: '박신입', role: '신입\n1년차',    tag: '주의',   tagBg: 'rgba(232,90,58,.15)',   tagColor: '#E85A3A' },
    { av: '응', color: '#8DC63F', name: '응우옌', role: '외국인\n근로자',  tag: '언어',   tagBg: 'rgba(58,107,154,.15)',  tagColor: '#3A6B9A' },
  ],
  en: [
    { av: 'K', color: '#F97316', name: 'Kim Chulsoo', role: 'Expert\n10yr',      tag: 'Stable', tagBg: 'rgba(141,198,63,.15)', tagColor: '#8DC63F' },
    { av: 'L', color: '#FCD34D', name: 'Lee Youngsoo', role: 'Semi-exp\n3yr',   tag: 'Mid',    tagBg: 'rgba(252,211,77,.15)', tagColor: '#FCD34D' },
    { av: 'P', color: '#C8D8E8', name: 'Park Rookie',  role: 'Newbie\n1yr',     tag: 'Caution',tagBg: 'rgba(232,90,58,.15)',  tagColor: '#E85A3A' },
    { av: 'N', color: '#8DC63F', name: 'Nguyen',        role: 'Foreign\nWorker', tag: 'Lang',   tagBg: 'rgba(58,107,154,.15)', tagColor: '#3A6B9A' },
  ],
};

const dlgEl    = document.getElementById('dialog');
const avEl     = document.getElementById('dlg-avatar');
const nameEl   = document.getElementById('dlg-npc-name');
const roleEl   = document.getElementById('dlg-npc-role');
const textEl   = document.getElementById('dlg-text');
const extraEl  = document.getElementById('dlg-extra');
const choicesEl = document.getElementById('dlg-choices');

// Babylon PointerEvent 캡처가 dialog 영역을 막지 못하도록 전파 차단
['pointerdown','pointerup','pointermove','touchstart','touchend','touchmove'].forEach(type => {
  dlgEl.addEventListener(type, e => e.stopPropagation(), true);
});

let twTimer = null;

function typewrite(el, str, cb, speed) {
  clearInterval(twTimer);
  el.textContent = '';
  let i = 0;
  twTimer = setInterval(() => {
    el.textContent += str[i++];
    if (i >= str.length) { clearInterval(twTimer); if (cb) cb(); }
  }, speed || 28);
}

function _hex2rgba(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function _getBlueprintHTML() {
  const lang = DLANG;
  const labels = {
    ko: { main: '사무/주거', stair: '계단', base: '지하주차', sz: '200㎡', fl: '지하1+지상5층', noise: '소음 주의' },
    en: { main: 'Office/Res', stair: 'Stair', base: 'Parking B1', sz: '200m²', fl: 'B1+5F', noise: 'Noise Zone' },
    vi: { main: 'Văn phòng', stair: 'Cầu thang', base: 'Đỗ xe B1', sz: '200m²', fl: 'T.hầm+5T', noise: 'Khu ồn' },
    ar: { main: 'مكتب/سكن', stair: 'سلّم', base: 'موقف B1', sz: '200م²', fl: 'ب1+5طوابق', noise: 'منطقة ضوضاء' },
  };
  const L = labels[lang] || labels.ko;
  return `<div class="blueprint">
    <div class="bp-grid">
      <div class="bp-room main">${L.main}</div>
      <div class="bp-room sub">${L.stair}</div>
      <div class="bp-room base">${L.base}</div>
    </div>
    <div class="bp-meta">
      <div class="bp-row"><span class="bp-dot" style="background:#8DC63F"></span>${L.sz}</div>
      <div class="bp-row"><span class="bp-dot" style="background:#3A6B9A"></span>${L.fl}</div>
      <div class="bp-row"><span class="bp-dot" style="background:#E85A3A"></span>${L.noise}</div>
    </div>
  </div>`;
}

function _getTeamHTML() {
  const members = (TEAM_DATA[DLANG] || TEAM_DATA.ko);
  return `<div class="team-grid">${members.map(m => `
    <div class="team-card">
      <div class="tc-av" style="color:${m.color};border-color:${m.color};background:${_hex2rgba(m.color,.12)}">${m.av}</div>
      <div class="tc-name">${m.name}</div>
      <div class="tc-role">${m.role}</div>
      <div class="tc-tag" style="background:${m.tagBg};color:${m.tagColor}">${m.tag}</div>
    </div>`).join('')}</div>`;
}

function showStep(idx) {
  if (idx === 'start') { _endDialog(); return; }
  const flow = FLOWS[DLANG] || FLOWS.ko;
  if (idx >= flow.length) { _endDialog(); return; }
  const step = flow[idx];

  // 초상화
  avEl.textContent = step.npc[0];
  avEl.style.borderColor = step.color;
  avEl.style.background  = _hex2rgba(step.color, 0.14);
  avEl.style.color       = step.color;
  nameEl.textContent = step.npc;
  roleEl.textContent = step.role;

  // 텍스트 타이프라이터
  typewrite(textEl, step.text, null, 26);

  // 추가 콘텐츠
  extraEl.innerHTML = step.extra === 'blueprint' ? _getBlueprintHTML()
                    : step.extra === 'team'      ? _getTeamHTML()
                    : '';

  // 선택지 버튼
  choicesEl.innerHTML = '';
  step.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className   = 'dlg-btn' + (c.accent ? ' accent' : '');
    btn.textContent = c.text;
    btn.addEventListener('click', () => showStep(c.next));
    choicesEl.appendChild(btn);
  });
}

function _endDialog() {
  dlgEl.classList.add('hidden');
  if (typeof unlockPlayer === 'function') unlockPlayer();
  if ('ontouchstart' in window) {
    // 트랜지션(0.35s) 종료 후 표시해서 dialog 페이드 중 겹침 방지
    setTimeout(() => {
      document.getElementById('joy-look').style.display = 'block';
    }, 400);
  }
}

/* ─── 대화 시작 (근접 인터랙션 트리거) ──────────────────── */
function _startDialog() {
  if (GAME.state.dialogActive) return;
  if (typeof lockPlayer === 'function') lockPlayer();
  document.getElementById('interact-prompt').style.display = 'none';
  // 대화 중 카메라 회전 영역 숨김
  const jl = document.getElementById('joy-look');
  if (jl) jl.style.display = 'none';
  dlgEl.classList.remove('hidden');
  showStep(0);
}

// 인터랙션 프롬프트: 클릭 / 탭
const ipEl = document.getElementById('interact-prompt');
ipEl.addEventListener('click', _startDialog);
ipEl.addEventListener('touchstart', e => { e.stopPropagation(); _startDialog(); }, { passive: true });

// E키 (데스크톱)
window.addEventListener('keydown', e => {
  if ((e.key === 'e' || e.key === 'E') && ipEl.style.display !== 'none') {
    _startDialog();
  }
});

// 언어별 프롬프트 문구 적용
window.addEventListener('game:ready', () => {
  const labels = {
    ko: '말 걸기', en: 'Talk', vi: 'Nói chuyện', ar: 'تحدث'
  };
  const el = document.getElementById('ip-label');
  if (el) el.textContent = labels[DLANG] || labels.ko;
});
</script>

/* ─── 안전조치 옵션 목록 ────────────────────────────────── */
const _SAFETY_OPTS = [
  { id: 'guard',    label: '굴착 단부 난간 설치' },
  { id: 'cone',     label: '라바콘 / 차선 규제' },
  { id: 'tape',     label: '출입금지 테이프 설치' },
  { id: 'net',      label: '낙하물 방지망' },
  { id: 'check',    label: '작업 전 안전점검' },

];

/* ─── 진입점: 현장 사전조사 대화 시작 ─────────────────── */
function _startSurveyDialog() {
  if (GAME.state.dialogActive) return;
  if (typeof lockPlayer === 'function') lockPlayer();
  const jl = document.getElementById('joy-look');
  if (jl) jl.style.display = 'none';
  document.getElementById('interact-prompt').style.display = 'none';
  dlgEl.classList.remove('hidden');
  showSurveyStep(0);
}

/* ─── 단계 표시 ─────────────────────────────────────────── */
function showSurveyStep(idx) {
  if (idx === 'done') { _endSurveyDialog(); return; }
  const step = SURVEY_FLOWS[idx];
  if (!step) { _endSurveyDialog(); return; }
  _svStep = idx;

  avEl.textContent         = step.npc[0];
  avEl.style.borderColor   = step.color;
  avEl.style.background    = _hex2rgba(step.color, 0.14);
  avEl.style.color         = step.color;
  nameEl.textContent       = step.npc;
  roleEl.textContent       = step.role;

  typewrite(textEl, step.text || '', null, 24);

  extraEl.innerHTML = _svExtraHTML(step.extra);
  if (step.extra) _svBindExtra(step.extra);

  choicesEl.innerHTML = '';
  step.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className   = 'dlg-btn' + (c.accent ? ' accent' : '');
    btn.textContent = c.text;
    btn.addEventListener('click', () => {
      if (c.pick !== undefined) PHASE.workPlan.depth = c.pick;
      showSurveyStep(c.next);
    });
    choicesEl.appendChild(btn);
  });
}

function _endSurveyDialog() {
  PHASE.flags.surveyComplete = true;
  PHASE.flags.workPlanDone   = true;
  PHASE.current              = 'excavation_prep';
  dlgEl.classList.add('hidden');
  if (typeof unlockPlayer === 'function') unlockPlayer();
  const jl = document.getElementById('joy-look');
  if (jl && 'ontouchstart' in window) setTimeout(() => { jl.style.display = 'block'; }, 400);
  setTimeout(() => { if (typeof _startTBM === 'function') _startTBM(); }, 800);
}

/* ─── Extra HTML 생성 ──────────────────────────────────── */
function _svExtraHTML(type) {
  switch (type) {
    case 'soil_choice':    return _svSoilChoiceHTML();
    case 'soil_result':    return _svSoilResultHTML();
    case 'utility_choice': return _svUtilityChoiceHTML();
    case 'utility_result': return _svUtilityResultHTML();
    case 'utility_doc_btn':return `<div style="margin-top:4px"><button class="dlg-btn" id="sv-util-doc-btn" style="pointer-events:auto">상세 보고서 열기</button></div>`;
    case 'method_choice':  return _svMethodChoiceHTML();
    case 'safety_choice':  return _svSafetyChoiceHTML();
    case 'workplan_btn':   return `<div style="margin-top:4px"><button class="dlg-btn" id="sv-wp-btn" style="pointer-events:auto">작업계획서 보기</button></div>`;
    default: return '';
  }
}

/* ─── Extra 이벤트 바인딩 ──────────────────────────────── */
function _svBindExtra(type) {
  if (type === 'soil_choice' || type === 'utility_choice' || type === 'method_choice') {
    extraEl.querySelectorAll('.survey-card[data-sv]').forEach(card => {
      card.addEventListener('click', () => _svCardClick(type, card.dataset.sv));
    });
  }
  if (type === 'safety_choice') {
    _svSafetySelected.clear();
    extraEl.querySelectorAll('.safety-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const id = chip.dataset.svs;
        if (_svSafetySelected.has(id)) {
          _svSafetySelected.delete(id);
          chip.classList.remove('sel');
        } else {
          _svSafetySelected.add(id);
          chip.classList.add('sel');
        }
      });
    });
    const done = document.getElementById('sv-safety-done');
    if (done) done.addEventListener('click', () => {
      PHASE.workPlan.safetyMeasures = [..._svSafetySelected]
        .map(id => _SAFETY_OPTS.find(o => o.id === id)?.label)
        .filter(Boolean);
      showSurveyStep(10);
    });
  }
  if (type === 'utility_doc_btn') {
    const b = document.getElementById('sv-util-doc-btn');
    if (b) b.addEventListener('click', _showUtilityDocOverlay);
  }
  if (type === 'workplan_btn') {
    const b = document.getElementById('sv-wp-btn');
    if (b) b.addEventListener('click', _showWorkplanDocOverlay);
  }
}

/* ─── 카드 선택 핸들러 ─────────────────────────────────── */
function _svCardClick(type, val) {
  if (type === 'soil_choice') {
    PHASE.survey.soilMethod = val;
    PHASE.survey.soilType   = val === 'standard' ? 'clay' :
      (Math.random() > 0.35 ? 'clay' : 'sand');
    const soilName = { clay: '점토질 지반', sand: '사질토 지반', rock: '암반' }[PHASE.survey.soilType];
    const method   = val === 'quick' ? '간이조사' : '표준관입시험(SPT)';
    SURVEY_FLOWS[3].text = `"${method} 결과 — ${soilName}으로 판별됩니다.\n굴착 공법 선택 시 참고하세요."`;
    showSurveyStep(3);
  }
  else if (type === 'utility_choice') {
    PHASE.survey.utilityMethod = val;
    if (typeof initSurveyUtilities === 'function') initSurveyUtilities();
    if (typeof showUtilityXray === 'function') showUtilityXray();
    const method = val === 'gpr' ? '지표투과레이더(GPR)' : '시험굴착';
    SURVEY_FLOWS[5].text = `"${method} 조사 완료. 3개 매설물이 부지 지하를 통과합니다.\nX-ray 시각화로 위치를 확인하세요."`;
    showSurveyStep(5);
  }
  else if (type === 'method_choice') {
    PHASE.workPlan.method = val;
    showSurveyStep(8);
  }
}

      <tr><td class="dlbl">이설 신청</td><td class="dval">굴착 계획선 ±1m 이내 매설물은 사전 이설 또는 우회 설계 필요</td></tr>
    </tbody></table>
    <div class="doc-close-row"><button class="doc-close-btn">닫기</button></div>
  `);
}

/* ─── 작업계획서 오버레이 ──────────────────────────────── */
function _showWorkplanDocOverlay() {
  const wp = PHASE.workPlan;
  const s  = PHASE.survey;
  const methodName = wp.method === 'slope' ? '사면개착 공법' : '흙막이 공법';
  const soilName   = { clay: '점토질 지반', sand: '사질토 지반', rock: '암반' }[s.soilType] || '-';
  const slopeRatio = { clay: '1:1.2', sand: '1:1.8', rock: '1:0.5' }[s.soilType] || '-';
  const utilList   = (s.utilities || []).map(u => `<li>${u.type} (심도 ${u.depth}m)</li>`).join('') || '<li>없음</li>';
  const safetyList = (wp.safetyMeasures || []).map(m => `<li>${m}</li>`).join('') || '<li>미선택</li>';
  _showDocOverlay(`
    <div class="doc-header">
      <div class="doc-title">굴착 공사 작업계획서</div>
      <div class="doc-sub">작성일: ${new Date().toLocaleDateString('ko-KR')} · 현장: BULSA 건설 부지</div>
    </div>
    <div class="doc-section">공사 개요</div>
    <table class="doc-table"><tbody>
      <tr><td class="dlbl">적용 공법</td><td class="dval">${methodName}</td></tr>
      <tr><td class="dlbl">굴착 깊이</td><td class="dval">${wp.depth}m</td></tr>
      <tr><td class="dlbl">토질 조건</td><td class="dval">${soilName}</td></tr>
      ${wp.method === 'slope' ? `<tr><td class="dlbl">사면비</td><td class="dval">${slopeRatio}</td></tr>` : ''}
    </tbody></table>
    <div class="doc-section">지하 매설물 현황</div>
    <table class="doc-table"><tbody>
      <tr><td colspan="2" class="dval"><ul style="margin:0;padding-left:16px">${utilList}</ul></td></tr>
    </tbody></table>
    <div class="doc-section">안전조치 계획</div>
    <table class="doc-table"><tbody>
      <tr><td colspan="2" class="dval"><ul style="margin:0;padding-left:16px">${safetyList}</ul></td></tr>
    </tbody></table>
    <div class="doc-section">긴급 연락처</div>
    <table class="doc-table"><tbody>
      <tr><td class="dlbl">가스 안전공사</td><td class="dval">1544-4500</td></tr>
      <tr><td class="dlbl">한국전력</td><td class="dval">123</td></tr>
      <tr><td class="dlbl">상수도 민원</td><td class="dval">121</td></tr>
    </tbody></table>
    <div class="doc-close-row"><button class="doc-close-btn">닫기</button></div>
  `);
}

/* ─── 공통 문서 오버레이 표시 ──────────────────────────── */
function _showDocOverlay(html) {
  const overlay = document.getElementById('doc-overlay');
  const paper   = document.getElementById('doc-paper-inner');
  if (!overlay || !paper) return;
  paper.innerHTML = html;
  overlay.classList.add('show');
  const btn = paper.querySelector('.doc-close-btn');
  if (btn) btn.addEventListener('click', () => overlay.classList.remove('show'));
}

/* ─── TBM (Tool Box Meeting) ──────────────────────────────── */
const TBM_LINES = [
  '"모두 모이세요. 착공 전 TBM을 진행합니다.\n오늘 작업: 굴착 단부 안전시설 설치입니다."',
  '"굴착 구역 4면에 난간, 모서리 4곳에 라바콘으로 작업 반경을 표시합니다.\n자재는 사무소 양옆 더미에 있습니다."',
  '"안전 수칙: 자재는 천천히, 양손으로. E키로 집고, 설치 위치에서 E키로 놓습니다.\n동료에게 위임할 수도 있습니다. 자, 시작합니다."',
];
let _tbmIdx = 0;

function _startTBM() {
  if (PHASE.flags.tbmDone) return;
  PHASE.current = 'tbm';
  if (typeof lockPlayer === 'function') lockPlayer();
  const ip = document.getElementById('interact-prompt');
  const ctx = document.getElementById('ctx-action-btn');
  if (ip)  ip.style.display = 'none';
  if (ctx) ctx.classList.remove('show');

  if (typeof NPCS !== 'undefined') {
    NPCS.forEach((npc, i) => { if (npc.moveToBriefingSpot) npc.moveToBriefingSpot(i); });
  }

  setTimeout(() => {
    _tbmIdx = 0;
    dlgEl.classList.remove('hidden');
    _showTBMLine(0);
  }, 900);
}

function _showTBMLine(idx) {
  if (idx >= TBM_LINES.length) { _endTBM(); return; }
  _tbmIdx = idx;
  avEl.textContent       = '철';
  avEl.style.borderColor = '#F97316';
  avEl.style.background  = 'rgba(249,115,22,.14)';
  avEl.style.color       = '#F97316';
  nameEl.textContent     = '김철수';
  roleEl.textContent     = '숙련공 · 10년차';
  typewrite(textEl, TBM_LINES[idx], null, 26);
  extraEl.innerHTML    = '';
  choicesEl.innerHTML  = '';
  const btn = document.createElement('button');
  btn.className = 'dlg-btn' + (idx === TBM_LINES.length - 1 ? ' accent' : '');
  btn.textContent = idx === TBM_LINES.length - 1 ? '작업 시작!' : '확인';
  btn.addEventListener('click', () => _showTBMLine(idx + 1));
  choicesEl.appendChild(btn);
}

function _endTBM() {
  PHASE.flags.tbmDone = true;
  PHASE.current = 'install';
  dlgEl.classList.add('hidden');
  if (typeof unlockPlayer === 'function') unlockPlayer();

  if (typeof NPCS !== 'undefined') {
    const spots = [[-6,0.85,14],[6,0.85,14],[-4,0.85,30],[4,0.85,30]];
    NPCS.forEach((npc, i) => {
      const p = spots[i] || spots[0];
      npc.task = { phase:'goBriefing', target: new BABYLON.Vector3(p[0], p[1], p[2]) };
    });
  }

  const jl = document.getElementById('joy-look');
  if (jl && ('ontouchstart' in window)) setTimeout(() => { jl.style.display = 'block'; }, 400);

  const cl = document.getElementById('install-checklist');
  if (cl) cl.style.display = 'block';
}

/* ─── 토스트 헬퍼 ─────────────────────────────────────── */
function _showSiteToast(msg) {
  let t = document.getElementById('site-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'site-toast';
    t.style.cssText = 'position:fixed;top:40%;left:50%;transform:translateX(-50%);background:rgba(13,27,42,.92);border:2px solid #8DC63F;border-radius:14px;padding:14px 28px;font-size:1rem;font-weight:800;color:#8DC63F;z-index:80;backdrop-filter:blur(8px);pointer-events:none;opacity:0;transition:opacity .4s;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2800);
}

/* ─── 설치 완료 핸들러 ──────────────────────────────────── */
window.addEventListener('phase:installComplete', () => {
  setTimeout(() => {
    const cl = document.getElementById('install-checklist');
    if (cl) cl.style.display = 'none';
  }, 2000);
  PHASE.flags.installDone = true;
  setTimeout(() => {
    _showSiteToast('굴착 단계 시작 — 굴착기가 진입합니다');
    window.dispatchEvent(new Event('phase:excavationStart'));
  }, 2500);
});

/* ─── phase:excavationComplete 핸들러 ─────────────────── */
window.addEventListener('phase:excavationComplete', () => {
  PHASE.current = 'foundation';
  setTimeout(() => {
    document.getElementById('excavation-progress').style.display = 'none';
  }, 4000);
  _showSiteToast('굴착 완료 — 다음 공정: 기초공사');
});

/* ─── 모바일 버킷 버튼 ────────────────────────────────── */
(function() {
  const btn = document.getElementById('exc-bucket-roll');
  if (!btn) return;
  let held = false;
  btn.addEventListener('touchstart', e => { e.preventDefault(); held = true; }, { passive:false });
  btn.addEventListener('touchend',   () => { held = false; });
  setInterval(() => {
    if (held && typeof EXCAVATOR !== 'undefined' && EXCAVATOR.mounted) {
      EXCAVATOR.bucketAngle = Math.max(-1.20, EXCAVATOR.bucketAngle - 0.04);
    }
  }, 33);
})();

/* ─── 난간 시스템 키/버튼 바인딩 + 프리뷰 업데이트 ────────── */
(function() {
  function fwdVec() {
    if (!GAME || !GAME.camera) return new BABYLON.Vector3(0, 0, 1);
    const v = GAME.camera.target.subtract(GAME.camera.position);
    v.y = 0;
    const l = v.length();
    return l > 0.001 ? v.scaleInPlace(1 / l) : new BABYLON.Vector3(0, 0, 1);
  }

  // R 키: 모드 순환 (none → post → rail → none)
  // F 키: 가까운 난간 제거
  window.addEventListener('keydown', e => {
    if (typeof RAILING === 'undefined') return;
    if (document.getElementById('dialog') && !document.getElementById('dialog').classList.contains('hidden')) return;
    if (e.key === 'r' || e.key === 'R') RAILING.cycleMode();
    else if (e.key === 'f' || e.key === 'F') RAILING.removeNearPlayer();
    else if (e.key === 'q' || e.key === 'Q') {
      if (RAILING.getMode() !== 'none') RAILING.interactFromBtn();
    }
  });

  // 버튼 바인딩 (game:ready 후 DOM 준비됨)
  window.addEventListener('game:ready', () => {
    setTimeout(() => {
      const tog = document.getElementById('railing-toggle-btn');
      if (tog) tog.addEventListener('click', () => RAILING.cycleMode());

      const bp = document.getElementById('rbtn-post');
      const br = document.getElementById('rbtn-rail');
      if (bp) bp.addEventListener('click', () => RAILING.setMode('post'));
      if (br) br.addEventListener('click', () => RAILING.setMode('rail'));

      const place = document.getElementById('rl-place-btn');
      if (place) place.addEventListener('click', () => RAILING.interactFromBtn());

      const rm = document.getElementById('rl-remove-btn');
      if (rm) rm.addEventListener('click', () => RAILING.removeNearPlayer());

      // per-frame preview update
      if (GAME && GAME.scene) {
        GAME.scene.onBeforeRenderObservable.add(() => {
          if (typeof RAILING === 'undefined' || !GAME.player) return;
          if (RAILING.getMode() === 'none') return;
          RAILING.update(GAME.player.position, fwdVec());
        });
      }
    }, 200);
  });
})();
</script>
